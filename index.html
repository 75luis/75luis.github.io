<!DOCTYPE html>
<html>
  <head>
    <title>Inicio de Sesión</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link rel="stylesheet" type="text/css" href="inicio.css">
    <link rel="stylesheet" href="inicio.js">
  </head>
  <body>
    <div>
      <div class="cuadro-title">
        <h1>MI EMPRESA DE CHICHAS</h1>
      </div>
      <div class="login">
        <h1>Iniciar Sesión</h1>
        <form>
          <label for="usuario">Usuario:</label>
          <div class="cuadro-usuario">
            <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario">
          </div>
          <label for="contrasena">Contraseña:</label>
          <div class="cuadro-contrasena">
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña">
          </div>
          <div class="g-recaptcha" data-sitekey="TU_CLAVE_DE_SITIO"></div>
          <div class="cuadro-validation">
            <label for="Validacion">codigo de validacion:</label>
            <input type="tex" name="validadcion" placeholder="CODIGO DE VALIDACION">
          </div> 
          <input type="submit" value="Ingresar">
          <p>¿No tienes cuenta? <a href="#">Regístrate</a></p>
        </form>
      </div>
    </div>
    
  </body>
</html>
